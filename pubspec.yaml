name: faddompet
description: "FadDompet is an offline-first personal money management app."
publish_to: "none"

version: 1.0.0+2

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  intl: ^0.20.3
  fl_chart: ^1.2.0
  file_picker: 8.3.2
  share_plus: 10.1.4
  csv: ^8.0.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.3

  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  drift_dev: ^2.34.0

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  adaptive_icon_foreground_inset: 16
  min_sdk_android: 23

flutter:
  uses-material-design: true

  assets:
    - assets/icons/app_icon.png
