name: faddompet
description: "FadDompet is an offline-first personal money management app."
publish_to: "none"

version: 1.3.0+5000

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.3.2
  drift: ^2.34.1
  drift_flutter: ^0.3.0
  sqlite3_flutter_libs: ^0.6.0+eol
  intl: ^0.20.3
  fl_chart: ^1.2.0
  file_picker: 12.0.0-beta.7
  share_plus: 13.2.0
  csv: ^8.0.0
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.3.1
  crypto: ^3.0.7
  url_launcher: ^6.3.2
  package_info_plus: ^10.2.0
  http: ^1.6.0
  path_provider: ^2.1.6
dev_dependencies:
  flutter_launcher_icons: ^0.14.3

  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.15.1
  drift_dev: ^2.34.0

flutter_launcher_icons:
  android: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  adaptive_icon_foreground_inset: 16
  min_sdk_android: 23

flutter:
  uses-material-design: true

  assets:
    - assets/icons/app_icon.png
