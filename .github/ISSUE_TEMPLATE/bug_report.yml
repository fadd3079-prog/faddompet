name: Bug report
description: Report a reproducible problem in FadDompet.
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the problem clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the issue.
      placeholder: |
        1. Open ...
        2. Tap ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Attach screenshots if they help explain the issue. Remove personal financial data first.
    validations:
      required: false
  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: 1.2.0
    validations:
      required: true
  - type: input
    id: android-version
    attributes:
      label: Android version
      placeholder: Android 16
    validations:
      required: true
  - type: input
    id: device-model
    attributes:
      label: Device model
      placeholder: Redmi 13
    validations:
      required: true
  - type: dropdown
    id: apk-source
    attributes:
      label: APK source
      options:
        - GitHub Releases
        - Local build
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Add any extra details here.
    validations:
      required: false
