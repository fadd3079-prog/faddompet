name: Feature request
description: Suggest an improvement for FadDompet.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem would this feature solve?
      placeholder: Describe the user problem or workflow.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe the change you want to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: What other approaches did you consider?
    validations:
      required: false
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      placeholder: Who would use this, and when?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      placeholder: Add screenshots, examples, or references if useful.
    validations:
      required: false
